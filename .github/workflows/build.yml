name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-erosion-clean
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - run: gradle wrapper
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: world-erosion-mod
          path: world-erosion-clean/build/libs/*.jar
          if-no-files-found: error
